<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANDA360</title>
    <meta name="description" content="HANDA360 is an offline capable disaster-preparedness web application">

    <link rel="stylesheet" href="web/css/colors.css">
    <link rel="stylesheet" href="web/css/general.css">
    <link rel="stylesheet" href="web/css/header.css">
    <link rel="stylesheet" href="web/css/toast.css">
    <link rel="stylesheet" href="web/css/form.css">
    <link rel="stylesheet" href="web/css/mobile.css">
    <link rel="stylesheet" href="web/css/checklist.css">
    <link rel="stylesheet" href="web/css/contactlist.css">
    <link rel="stylesheet" href="web/css/about.css">
    <link rel="stylesheet" href="web/css/contact.css">
</head>

<body>
    <header>
        <img src="assets/images/handa360-logo.png" alt="Handa360 Logo">

        <nav class="nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="" id="navigate-home">Home</a></li>
                <li class="nav-item"><a href="" id="navigate-about">About</a></li>
                <li class="nav-item"><a href="" id="navigate-contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div id="toast-container" role="status">

    </div>

    <hr>

    <main id="container">
        <section class="checklist-block">

    </main>

    <template id="toast-template">
        <div class="toast" role="status">

        </div>
    </template>

    <template id="checklist-template">
        <section class="checklist-block">
            <h2 class="checklist-header"></h2>
        </section>
    </template>

    <template id="checklist-item-template">
        <label class="checklist-item">
            <input type="checkbox" class="checklist-item-checkbox">
            <span class="checkmark"></span>
            <span class="checklist-item-text"></span>
        </label>
    </template>

    <template id="contactlist-template">
        <section class="contactlist-block">
            <h2 class="contactlist-header"></h2>
        </section>
    </template>

    <template id="contactlist-item-template">
        <div class="contactlist-item">
            <input type="text" class="contactlist-item-input" readonly aria-label="Contact information">
            <button type="button" class="contactlist-copy-button" aria-label="Copy contact information">
                Copy
            </button>
        </div>
    </template>

    <template id="form-template">
        <form class="form-block">
            <div class="questions-container"></div>
            <button type="submit" class="btn-submit">Submit</button>
        </form>
    </template>

    <template id="question-template">
        <section class="question-block">
            <h2 class="question-text"></h2>
            <div class="options-container"></div>
        </section>
    </template>

    <template id="option-template">
        <label class="option-label">
            <input type="radio">
            <span class="option-button"></span>
        </label>
    </template>

    <section id="about-section">
        <h2>About Handa360</h2>
        <p>Handa360 is a web application that helps you ....</p>
        <h2>How can Handa360 help?</h2>
        <p>Handa360 ....</p>
    </section>
    <section id="contact-section">
        <h2>Contact Handa360</h2>
        <p>Handa360 is a web application that helps you ....</p>
        <h2>How can Handa360 help?</h2>
        <p>Handa360 ....</p>
    </section>

    <script type="module" src="web/app.js"></script>
    <script src="web/js/ui/pageNavigation.js"></script>
</body>

</html>
