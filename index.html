<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handa360</title>
  <link rel="stylesheet" href="web/css/style.css" />
</head>
<body>

  <header>
    <img src="logo/handa360-logo.png" alt="Handa360" class="header-logo" />
  </header>

  <main>
    <form id="assessmentForm" action="#" method="get">

      <!-- QUESTION 1: Location (single-select via radio) -->
      <div class="question-block">
        <p class="question-text">Where are you right now?</p>
        <div class="option-grid single-select">

          <label class="option-label">
            <input type="radio" name="location" value="kalibo" />
            <span class="option-button">Kalibo</span>
          </label>

          <label class="option-label">
            <input type="radio" name="location" value="malinao" />
            <span class="option-button">Malinao</span>
          </label>

          <label class="option-label">
            <input type="radio" name="location" value="iloilo" />
            <span class="option-button">Iloilo</span>
          </label>

        </div>
      </div>

      <!-- QUESTION 2: Hazard (multi-select via checkbox) -->
      <div class="question-block">
        <p class="question-text">What are you experiencing?</p>
        <div class="option-grid multi-select">

          <label class="option-label">
            <input type="checkbox" name="hazard" value="flooding" />
            <span class="option-button">Flooding</span>
          </label>

          <label class="option-label">
            <input type="checkbox" name="hazard" value="earthquake" />
            <span class="option-button">Earthquake</span>
          </label>

          <label class="option-label">
            <input type="checkbox" name="hazard" value="fire" />
            <span class="option-button">Fire</span>
          </label>

          <label class="option-label">
            <input type="checkbox" name="hazard" value="typhoon" />
            <span class="option-button">Typhoon</span>
          </label>

        </div>
      </div>

      <div class="form-footer">
        <p class="separator">. . . .</p>
        <button type="submit" class="btn-submit">Submit</button>
      </div>

    </form>
  </main>

</body>
</html>
