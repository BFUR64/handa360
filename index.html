<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="web/css/general.css">
    <link rel="stylesheet" href="web/css/header.css">
    <link rel="stylesheet" href="web/css/form.css">
    <link rel="stylesheet" href="web/css/mobile.css">
</head>
<body>
    <header>
        <img src="assets/images/handa360-logo.png" alt="">

        <nav class="nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="">Home</a></li>
                <li class="nav-item"><a href="">About</a></li>
                <li class="nav-item"><a href="">Contact</a></li>
            </ul>
        </nav>
    </header>

    <hr>

    <main id="container">

    </main>

    <template id="checklist-template">
        <section class="checklist-block">
        </section>
    </template>

    <template id="checklist-item-template">
        <label class="checklist-item">
            <input type="checkbox" class="checklist-item-checkbox">
            <span class="checklist-item-text"></span>
        </label>
    </template>

    <template id="form-template">
        <form class="form-block">
            <div class="questions-container"></div>
            <button type="submit" class="btn-submit">Submit</button>
        </form>
    </template>

    <template id="question-template">
        <section class="question-block">
            <h2 class="question-text"></h2>
            <div class="options-container"></div>
        </section>
    </template>

    <template id="option-template">
        <label class="option-label">
            <input type="radio">
            <span class="option-button"></span>
        </label>
    </template>

    <script type="module" src="web/app.js"></script>
</body>
</html>
