<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handa360</title>
    <link rel="stylesheet" href = "style.css"/>
</head>
<body>
<header>
    <img src="../assets/images/handa360-logo.png" alt="Handa360" class="logo"/>
   <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
   </nav>
</header>
<main>
    <form id="assessmentForm">
        <fieldset class="location-fieldset">
            <h2 class="question-text">Where are you?</h2>

          <!--NOTE: This part can or will be replaced by fetching data from the data/locations.json and looped in JavaScript-->
          <div class="location-options-container">
            <label for="aklan" class="location-option">
              <input type="radio" id="aklan" name="location" value="Aklan">
              <span class="location-text">Aklan</span>
            </label>
            
            <label for="capiz" class="location-option">
              <input type="radio" id="capiz" name="location" value="Capiz">
              <span class="location-text">Capiz</span>
            </label>

            <label for="iloilo" class="location-option">
              <input type="radio" id="iloilo" name="location" value="Iloilo">
              <span class="location-text">Iloilo</span>
            </label>

            <label for="caloocan" class="location-option">
              <input type="radio" id="caloocan" name="location" value="Caloocan">
              <span class="location-text">Caloocan</span>
            </label>
            
            <label for="quezon-city" class="location-option">
              <input type="radio" id="quezon-city" name="location" value="Quezon City">
              <span class="location-text">Quezon City</span>
            </label>

            <label for="manila" class="location-option">
              <input type="radio" id="manila" name="location" value="Manila">
              <span class="location-text">Manila</span>

            <label for="san-juan" class="location-option">
              <input type="radio" id="san-juan" name="location" value="San Juan">
              <span class="location-text">San Juan</span>
            </label>
            
            <label for="mandaluyong" class="location-option">
              <input type="radio" id="mandaluyong" name="location" value="Mandaluyong">
              <span class="location-text">Mandaluyong</span>
            </label>

            <label for="pasig" class="location-option">
              <input type="radio" id="pasig" name="location" value="Pasig">
              <span class="location-text">Pasig</span>
            </label>
          </div>
        </fieldset>
        <br><br>
        <fieldset class="hazard-fieldset">
           <h2 class="question-text">What's the Hazard?</h2>

          <div class="hazard-options-container">
           <div class="hazard-options">
            <label for="earthquake" class="location-option">
              <input type="radio" id="earthquake" name="hazard" value="Earthquake">
              <span class="hazard-text">Earthquake
              <img src="././image/earthquake.png" alt="Earthquake" class="hazard-icon"/>
              </span>
            </label>
            
            <label for="flood" class="location-option">
              <input type="radio" id="flood" name="hazard" value="Flood">
              <span class="hazard-text">Flood
              <img src="././image/flood.png" alt="Flood" class="hazard-icon"/>
              </span>
            </label>
            </div>

            <div class="hazard-options">
            <label for="landslide" class="location-option">
              <input type="radio" id="landslide" name="hazard" value="Landslide">
              <span class="hazard-text">Landslide
              <img src="././image/landslide.png" alt="Landslide" class="hazard-icon"/>
              </span>
            </label>
            
            <label for="typhoon" class="location-option">
              <input type="radio" id="typhoon" name="hazard" value="Typhoon">
              <span class="hazard-text">Typhoon
              <img src="././image/typhoon.png" alt="Typhoon" class="hazard-icon"/>
              </span>
            </label>
            </div>

            <div class="hazard-options">
            <label for="fire" class="location-option">
              <input type="radio" id="fire" name="hazard" value="Fire">
              <span class="hazard-text">Fire
              <img src="././image/fire.png" alt="Fire" class="hazard-icon"/>
              </span>
            </label>
            
            <label for="tsunami" class="location-option">
              <input type="radio" id="tsunami" name="hazard" value="Tsunami">
              <span class="hazard-text">Tsunami
              <img src="././image/tsunami.png" alt="Tsunami" class="hazard-icon"/>
              </span>
            </label>
            </div>

            <div class="hazard-options">
            <label for="volcano" class="location-option">
              <input type="radio" id="volcano" name="hazard" value="Volcano">
              <span class="hazard-text">Volcanic Eruption
              <img src="././image/volcano.png" alt="Volcano" class="hazard-icon"/>
              </span>
            </label>
            
            <label for="heat_wave" class="location-option">
              <input type="radio" id="heat_wave" name="hazard" value="Heat Wave">
              <span class="hazard-text">Heat Wave
              <img src="././image/heat_wave.png" alt="Heat Wave" class="hazard-icon"/>
              </span>
            </label>
            </div>
          </div>

        </fieldset>
        <br><br>
        <button type="submit" class="submit-button">Submit</button>
    </form>

    <section id="report">
      <fieldset id="action-field">
        <h2>Action</h2>
        <div class="action-list">
        <!--To be Modified for looping-->
        <span><input type="checkbox" id="action1" name="action1">
        <label for="action1">Action 1</label></span>
        <span><input type="checkbox" id="action2" name="action2">
        <label for="action2">Action 2</label></span>
        <span><input type="checkbox" id="action3" name="action3">
        <label for="action3">Action 3</label></span>
        </div>
      </fieldset>
      <fieldset id="contact-field">
        <h2>Contact</h2>
        <div class="action-list">
        <!--To be Modified for looping-->
        <span><input type="checkbox" id="contact1" name="contact1">
        <label for="contact1">Contact 1</label></span>
        <span><input type="checkbox" id="contact2" name="contact2">
        <label for="contact2">Contact 2</label></span>
        <span><input type="checkbox" id="contact3" name="contact3">
        <label for="contact3">Contact 3</label></span>
        </div>
      </fieldset>
    </section>
</main>
<script src="script.js"></script>
</body>
</html>
