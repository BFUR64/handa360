<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <img src="../../logo/handa360-logo.png" alt="">

        <div class="nav">
            <ul class="nav-list">
                <li class="nav-item">Home</li>
                <li class="nav-item">About</li>
                <li class="nav-item">Contact</li>
            </ul>
        </div>
    </header>

    <hr>

    <main>
        <template id="assessmentForm-template">
            <section class="question-block">
                <h2 class="question-text"></h2>

                <label class="option-label">
                    <input type="radio" name="{{name}}" value="{{value}}">
                    <span class="option-button"></span>
                </label>
            </section>
        </template>

        <form id="assessmentForm">
            <section class="question-block">
                <h2 class="question-text">Where are you?</h2>

                <label class="option-label">
                    <input type="radio" name="location" value="kalibo">
                    <span class="option-button">Kalibo</span>
                </label>

                <label class="option-label">
                    <input type="radio" name="location" value="manila">
                    <span class="option-button">Manila</span>
                </label>

                <label class="option-label">
                    <input type="radio" name="location" value="iloilo">
                    <span class="option-button">Iloilo</span>
                </label>
            </section>

            <section class="question-block">
                <h2 class="question-text">What's the Hazard?</h2>

                <label class="option-label">
                    <input type="radio" name="hazard" value="typhoon">
                    <span class="option-button">Typhoon</span>
                </label>

                <label class="option-label">
                    <input type="radio" name="hazard" value="flood">
                    <span class="option-button">Flood</span>
                </label>

                <label class="option-label">
                    <input type="radio" name="hazard" value="earthquake">
                    <span class="option-button">Earthquake</span>
                </label>

                <label class="option-label">
                    <input type="radio" name="hazard" value="landslide">
                    <span class="option-button">Landslide</span>
                </label>
            </section>

            <section>
                <div></div>
            </section>

            <div class="form-footer">
                <button type="submit" class="btn-submit">Submit</button>
            </div>
        </form>
    </main>
</body>
</html>
