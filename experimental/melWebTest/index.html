<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handa360</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1>Handa360</h1>
        <p>Handa360 is a web application that turns general disaster-preparedness instructions into a catered set of actionable items.</p>
    </div>

    <form id="queryForm">
        <div class="questionBoxes" id="questionBox1">
            <h2>Question 1</h2>
            <p>Where are you right now?</p>
            <script src="locationParser.js"></script>
            <!--
            <label>
                <input type="radio" name="question1" value="kalibo" required> Kalibo
            </label>

            <label>
                <input type="radio" name="question1" value="malinao"> Malinao
            </label>

            <label>
                <input type="radio" name="question1" value="iloilo"> Iloilo
            </label>
            -->
        </div>

        <div class="questionBoxes" id="questionBox2">
            <h2>Question 2</h2>
            <p>What are you experiencing?</p>
            <script src="hazardParser.js"></script>
            <!--
            <label>
                <input type="radio" name="question2" value="flooding" required> Flooding
            </label>

            <label>
                <input type="radio" name="question2" value="earthquake"> Earthquake
            </label>

            <label>
                <input type="radio" name="question2" value="fire"> Fire
            </label>
            <label>
                <input type="radio" name="question2" value="typhoon"> Typhoon
            </label>
            -->
        </div>

        <div class="questionBoxes">
            <button type="submit">Submit</button>
        </div>
    </form>

    <!-- Inside this div is where the template appears -->
    <div id="output"></div>

    <template id="checklist-template">
        <label class="checklist-item">
            <input type="checkbox" class="checklist-item-checkbox"> <span class="checklist-item-text"></span>
        </label>
    </template>
</body>
<script src="script.js"></script>
</html>
