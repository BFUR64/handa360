<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Handa360</title>
        <style>
            div {
                text-align: center;
                border: 1px solid black;
                border-radius: 10px;
                padding: 10px;
                width: 1000px;
                margin: 10px auto;
            }
            .questionBoxes {
                text-align: left;
            }
        </style>
    </head>

    <body>
        <div>
            <h1>Handa360</h1>
            <p>Handa360 is a web application that turns general disaster-preparedness instructions into a catered set of actionable items.</p>
        </div>

        <form>
            <div class="questionBoxes">
                <h1>Question 1</h1>
                <p>Where are you right now?</p>
                <label>
                    <input type="radio" name="firstAnswer"> Kalibo
                </label>

                <label>
                    <input type="radio" name="firstAnswer"> Malinao
                </label>

                <label>
                    <input type="radio" name="firstAnswer"> Iloilo
                </label>
            </div>

            <div class="questionBoxes">
                <h1>Question 1</h1>
                <p>Where are you experiencing?</p>
                <label>
                    <input type="radio" name="secondAnswer"> Flooding
                </label>

                <label>
                    <input type="radio" name="secondAnswer"> Earthquake
                </label>

                <label>
                    <input type="radio" name="secondAnswer"> Fire
                </label>
                <label>
                    <input type="radio" name="secondAnswer"> Typhoon
                </label>
            </div>

            <div class="questionBoxes">
                <button type="submit">Submit</button>
            </div>
        </form>
    </body>
</html>
