<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Handa360</title>
</head>
<body id="body">
    <div id="hazard">
        <p>What's the hazard?</p>
        <form action="/index.html" method="GET">
            <input type="radio" name="hazard" value="typhoon">
            <label for="">Typhoon</label>

            <input type="radio" name="hazard" value="flood">
            <label for="">Flood</label>

            <input type="radio" name="hazard" value="earthquake">
            <label for="">Earthquake</label>

            <input type="radio" name="hazard" value="landslide">
            <label for="">Landslide</label>

            <input type="submit">
        </form>
    </div>
</body>
</html>
